<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Simple HTML Page with Button</title>
	<style>
		body {
			background-color: #333;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			font-family: Arial, sans-serif;
			text-align: center;
			padding: 50px;
		}

		.button {
			font-size: 140px;
			padding: 15px 30px;
			background-color: #4caf50;
			color: white;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}

		.button:hover {
			background-color: #45a049;
		}
	</style>
</head>

<body>
	<h1>Welcome to My Simple HTML Page</h1>
	<button id="clickbtn" class="button">
		Click Me!
	</button>
	<script>
		let buttonRef = window.document.getElementById("clickbtn");
		buttonRef.addEventListener('click',function(){
			buttonRef.style.backgroundColor = 'pink';
		})

		

	</script>
</body>

</html>
